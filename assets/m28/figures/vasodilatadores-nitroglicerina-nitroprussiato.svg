<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Vasodilatadores — nitroglicerina versus nitroprussiato</title><desc id="d">Figura didática do módulo 28F comparando nitroglicerina, nitroprussiato e via NO-cGMP.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}.ln{stroke:#b58a49;stroke-width:4;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="300" y="64" class="t h big">VASODILATADORES — <tspan fill="#e24b47">NTG × NPS</tspan></text><text x="420" y="110" class="t m">descongestionar, reduzir pré/pós-carga sem perder a hemodinâmica</text><rect x="70" y="165" width="610" height="575" rx="26" class="p"/><text x="105" y="225" class="i h m" fill="#a0262b">NITROGLICERINA</text><text x="105" y="270" class="i s">venodilatador predominante</text><path d="M130 390h90l50-70 65 70h90" stroke="#171512" stroke-width="5" fill="none"/><text x="108" y="475" class="i s">via: NO → cGMP</text><text x="108" y="530" class="i s">↓ pré-carga · ↓ congestão</text><text x="108" y="585" class="i s">benefício coronariano contextual</text><text x="108" y="640" class="i s">combina com dobutamina se PA permite</text><rect x="770" y="165" width="610" height="575" rx="26" class="p"/><text x="805" y="225" class="i h m" fill="#2f8796">NITROPRUSSIATO</text><text x="805" y="270" class="i s">arterial + venoso balanceado</text><path d="M830 390h75l55-60 55 60h75l55-60 55 60" stroke="#171512" stroke-width="5" fill="none"/><text x="808" y="475" class="i s">via: NO → cGMP direta</text><text x="808" y="530" class="i s">↓ pós-carga potente · ↓ pré-carga</text><text x="808" y="585" class="i s">útil para VE congesto hipertenso</text><text x="808" y="640" class="i s">risco: hipotensão e toxicidade CN/SCN</text><rect x="210" y="790" width="1030" height="170" rx="24" class="d"/><text x="250" y="845" class="t h m" fill="#d5a64d">LÓGICA</text><text x="250" y="895" class="t s">vasodilatador não trata choque como reflexo; trata geometria: pressão de enchimento, congestão, pós-carga e trabalho ventricular</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 28F · Vasodilatadores</text></svg>