<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Ventrículo direito — apoiar o VD sem derrubar o sistema</title><desc id="d">Figura didática do módulo 28G sobre suporte farmacológico do ventrículo direito e hipertensão pulmonar.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}.ln{stroke:#b58a49;stroke-width:4;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="285" y="64" class="t h big">VENTRÍCULO DIREITO — <tspan fill="#e24b47">APOIAR O VD</tspan></text><text x="390" y="110" class="t m">estratégias farmacológicas em disfunção de VD e hipertensão pulmonar</text><rect x="35" y="150" width="1378" height="165" rx="24" class="p"/><text x="70" y="205" class="i h m" fill="#a0262b">CENÁRIOS FREQUENTES</text><text x="75" y="260" class="i s">1 embolia pulmonar aguda · 2 infarto de VD · 3 hipertensão pulmonar descompensada · 4 VD no choque séptico</text><rect x="70" y="365" width="470" height="300" rx="24" class="d"/><text x="105" y="425" class="t h m" fill="#d5a64d">PILAR 1</text><text x="105" y="475" class="t s">manter perfusão sistêmica e coronária do VD</text><text x="105" y="535" class="t xs">PAM adequada · diástole preservada · evitar taquiarritmia · pré-carga suficiente</text><rect x="905" y="365" width="470" height="300" rx="24" class="d"/><text x="940" y="425" class="t h m" fill="#2f8796">PILAR 2</text><text x="940" y="475" class="t s">reduzir pós-carga pulmonar quando possível</text><text x="940" y="535" class="t xs">oxigenação · evitar acidose/hipercapnia · vasodilatação pulmonar seletiva</text><circle cx="725" cy="505" r="135" fill="#14202a" stroke="#2f8796" stroke-width="6"/><path d="M700 405c-78 52-74 170-10 215 60 42 125-30 108-100-10-58-46-95-98-115z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><text x="690" y="520" class="t h m">VD</text><rect x="35" y="710" width="1378" height="210" rx="24" class="p"/><text x="70" y="770" class="i h m" fill="#a0262b">FERRAMENTAS</text><text x="75" y="820" class="i s">noradrenalina: chão sistêmico · dobutamina: inotropia de VD · milrinona: ino + ↓RVP · vasopressina: adjuvante sem FC · iNO/PGI₂: vasodilatação pulmonar seletiva</text><text x="75" y="875" class="i s">armadilhas: hipotensão sistêmica · taquiarritmia · vasodilatação excessiva · dependência de pré-carga</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 28G · VD e hipertensão pulmonar</text></svg>