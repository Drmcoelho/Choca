<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Vasopressina — recuperar tônus fora da catecolamina</title><desc id="d">Figura didática do módulo 28C mostrando ação V1a, efeitos hemodinâmicos, combinações e riscos da vasopressina.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}.ln{stroke:#b58a49;stroke-width:4;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="300" y="64" class="t h big">VASOPRESSINA — <tspan fill="#e24b47">TÔNUS FORA DA CATECOLAMINA</tspan></text><text x="420" y="110" class="t m">adjuvante vasopressor para vasoplegia refratária</text><rect x="35" y="150" width="390" height="300" rx="24" class="p"/><text x="64" y="205" class="i h m" fill="#a0262b">1 · MOLÉCULA</text><text x="64" y="250" class="i s">Peptídeo nonapeptídeo · ADH</text><path d="M95 345l60-55 75 20 58-65 72 52-30 78-92 20-80 65-86-30z" stroke="#171512" stroke-width="5" fill="none"/><text x="100" y="284" class="i xs">Cys</text><text x="220" y="280" class="i xs">Tyr</text><text x="350" y="290" class="i xs">Phe</text><text x="150" y="455" class="i xs">Arg</text><rect x="455" y="150" width="380" height="300" rx="24" class="p"/><text x="485" y="205" class="i h m" fill="#2f8796">2 · ALVOS</text><circle cx="540" cy="285" r="56" class="c"/><text x="505" y="304" class="t h m">V1a</text><text x="625" y="275" class="i h s">principal vascular</text><text x="625" y="314" class="i s">vasoconstrição · ↑ RVS · ↑ PAM</text><circle cx="540" cy="390" r="45" class="g"/><text x="510" y="407" class="t h s">V2</text><text x="625" y="384" class="i h s">renal/endócrino</text><text x="625" y="421" class="i s">antidiurese · risco Na↓</text><rect x="865" y="150" width="548" height="420" rx="24" class="d"/><text x="895" y="205" class="t h m" fill="#d5a64d">3 · EFEITO INICIAL</text><circle cx="1120" cy="360" r="108" fill="#26131a" stroke="#e24b47" stroke-width="6"/><path d="M1030 360c70-75 150-75 220 0M1030 360c70 75 150 75 220 0" stroke="#e24b47" stroke-width="12" fill="none"/><text x="925" y="285" class="t s">↑ vasoconstrição sistêmica</text><text x="925" y="525" class="t s">↑ retorno venoso</text><text x="1200" y="285" class="t s">↑ PAM</text><text x="1200" y="525" class="t s">↔ FC/contratilidade</text><path d="M1060 320l-120-42M1060 400l-120 118M1180 320l80-42M1180 400l80 115" class="ln"/><rect x="35" y="490" width="640" height="395" rx="24" class="p"/><text x="65" y="545" class="i h m" fill="#a0262b">4 · QUANDO PENSAR</text><text x="75" y="600" class="i s">• choque séptico refratário à noradrenalina adequada</text><text x="75" y="648" class="i s">• vasoplegia pós-cirurgia cardíaca</text><text x="75" y="696" class="i s">• estratégia poupadora de catecolamina</text><text x="75" y="744" class="i s">• choque vasodilatador grave</text><text x="65" y="822" class="i h m" fill="#a0262b">Combinações</text><text x="75" y="862" class="i s">NE + vasopressina · dobutamina + NE + vasopressina · resgate com ATII</text><rect x="715" y="620" width="698" height="265" rx="24" class="p"/><text x="750" y="680" class="i h m" fill="#a0262b">5 · ATENÇÃO</text><text x="760" y="735" class="i s">isquemia cutânea/digital/mesentérica · hiponatremia · dose fixa · reavaliar perfusão global</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 28C · Vasopressina</text></svg>