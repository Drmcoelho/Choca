<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Miocardiopatia séptica — quando o choque séptico esfria</title><desc id="d">Figura didática do módulo 21 sobre miocardiopatia séptica, baixo débito, noradrenalina, vasopressina, dobutamina e adrenalina.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="310" y="64" class="t h big">MIOCARDIOPATIA SÉPTICA — <tspan fill="#e24b47">O CHOQUE ESFRIA</tspan></text><text x="390" y="110" class="t m">a base continua vasopressora, mas o baixo débito exige outra leitura</text><rect x="35" y="150" width="410" height="420" rx="24" class="p"/><text x="65" y="205" class="i h m" fill="#a0262b">1 · RECONHECER</text><text x="75" y="260" class="i s">• extremidades frias e moteadas</text><text x="75" y="315" class="i s">• ScvO₂ baixa quando disponível</text><text x="75" y="370" class="i s">• lactato que não cai</text><text x="75" y="425" class="i s">• eco com contratilidade reduzida</text><text x="75" y="480" class="i s">• diurese baixa apesar de PAM</text><circle cx="720" cy="365" r="165" fill="#14202a" stroke="#b58a49" stroke-width="6"/><path d="M720 225c-90 58-84 205-8 260 72 50 150-35 130-120-12-70-55-116-122-140z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><circle cx="570" cy="270" r="22" class="c"/><circle cx="890" cy="300" r="22" class="r"/><circle cx="820" cy="520" r="18" class="c"/><text x="615" y="590" class="t h s">sepse + disfunção miocárdica = baixo débito</text><rect x="980" y="150" width="435" height="420" rx="24" class="p"/><text x="1010" y="205" class="i h m" fill="#9b6b22">2 · BASE</text><text x="1020" y="260" class="i s">primeiro restaurar pressão de perfusão</text><text x="1020" y="315" class="i s">noradrenalina: α1, PAM e perfusão</text><text x="1020" y="370" class="i s">vasopressina: V1a, poupadora de catecolamina</text><text x="1020" y="425" class="i s">meta: PAM adequada + perfusão real</text><circle cx="1320" cy="320" r="56" class="r"/><text x="1288" y="340" class="t h m">α1</text><circle cx="1320" cy="440" r="56" class="c"/><text x="1285" y="460" class="t h m">V1a</text><rect x="35" y="620" width="430" height="285" rx="24" class="p"/><text x="65" y="675" class="i h m" fill="#2f8796">3 · DOBUTAMINA</text><text x="75" y="730" class="i s">adicionar se baixo débito persiste</text><text x="75" y="780" class="i s">β1: ↑ inotropismo · ↑ débito</text><text x="75" y="830" class="i s">β2: pode reduzir RVS se vasoplegia predomina</text><rect x="510" y="620" width="430" height="285" rx="24" class="p"/><text x="540" y="675" class="i h m" fill="#a0262b">4 · ADRENALINA</text><text x="550" y="730" class="i s">pensar se hipotensão persiste</text><text x="550" y="780" class="i s">α1 + β1 + β2</text><text x="550" y="830" class="i s">interpretação do lactato exige contexto</text><rect x="985" y="620" width="430" height="285" rx="24" class="p"/><text x="1015" y="675" class="i h m" fill="#a0262b">5 · REAVALIAR</text><text x="1025" y="730" class="i s">arritmia · hipotensão com vasoplegia · eco seriado</text><text x="1025" y="780" class="i s">lactato, diurese, pele, estado mental</text><text x="1025" y="830" class="i s">ajustar a cada 30–60 min ou antes se instável</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 21 · Miocardiopatia séptica</text></svg>