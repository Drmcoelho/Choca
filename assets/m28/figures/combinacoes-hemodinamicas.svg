<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Combinações hemodinâmicas</title><desc id="d">Estratégias farmacológicas por fenótipo clínico com foco em dobutamina, vasopressores e vasodilatadores.</desc><defs><style>.bg{fill:#07090d}.panel{fill:#f5ecde;stroke:#b98d4b;stroke-width:3}.dark{fill:#10151c;stroke:#b98d4b;stroke-width:3}.txt{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f5ecde}.ink{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.mid{font-size:30px}.small{font-size:23px}.tiny{font-size:19px}.red{fill:#ba2c31}.cyan{fill:#2f8796}.gold{fill:#b7832e}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="txt h big">CHOCA</text><text x="360" y="64" class="txt h big">COMBINAÇÕES <tspan fill="#e24b47">HEMODINÂMICAS</tspan></text><text x="470" y="112" class="txt mid">estratégias por fenótipo clínico com foco em dobutamina</text><g transform="translate(40 150)"><rect class="panel" rx="26" width="650" height="390"/><circle cx="60" cy="50" r="42" class="red"/><text x="46" y="66" class="txt h mid">1</text><text x="130" y="58" class="ink h mid" fill="#9c2227">BAIXO DÉBITO + VASOPLEGIA</text><text x="45" y="130" class="ink small">coração hipoativo ↓DC</text><text x="45" y="168" class="ink small">vasodilatação sistêmica ↓RVS</text><rect x="290" y="105" width="310" height="92" rx="18" fill="#111821" stroke="#b98d4b"/><text x="315" y="145" class="txt h small" fill="#e24b47">NORADRENALINA</text><text x="315" y="178" class="txt tiny">α1 β1 · restaura tônus</text><rect x="290" y="215" width="310" height="92" rx="18" fill="#111821" stroke="#b98d4b"/><text x="315" y="255" class="txt h small" fill="#e24b47">DOBUTAMINA</text><text x="315" y="288" class="txt tiny">β1&gt;&gt;β2 · aumenta fluxo</text><text x="45" y="245" class="ink h small">lógica</text><text x="45" y="285" class="ink tiny">↑ RVS para perfundir órgãos</text><text x="45" y="315" class="ink tiny">+ ↑ contratilidade para entregar O₂</text><text x="45" y="355" class="ink h tiny" fill="#b92b2f">risco: excesso de pós-carga / isquemia</text></g><g transform="translate(755 150)"><rect class="panel" rx="26" width="650" height="390"/><circle cx="60" cy="50" r="42" class="red"/><text x="46" y="66" class="txt h mid">2</text><text x="130" y="58" class="ink h mid" fill="#9c2227">BAIXO DÉBITO + VASOPLEGIA REFRATÁRIA</text><rect x="45" y="110" width="560" height="70" rx="18" fill="#111821" stroke="#b98d4b"/><text x="70" y="153" class="txt h small" fill="#e24b47">NORADRENALINA + VASOPRESSINA + DOBUTAMINA</text><text x="45" y="225" class="ink h small">lógica</text><text x="45" y="265" class="ink tiny">α1 + V1a recuperam RVS por vias distintas</text><text x="45" y="295" class="ink tiny">e permitem inotropismo sem colapso de pressão</text><text x="45" y="340" class="ink h tiny" fill="#b92b2f">risco: isquemia periférica, hiponatremia, pós-carga</text></g><g transform="translate(40 590)"><rect class="panel" rx="26" width="650" height="390"/><circle cx="60" cy="50" r="42" class="gold"/><text x="46" y="66" class="txt h mid">3</text><text x="130" y="58" class="ink h mid" fill="#9b6b22">VE CONGESTO · PA SUSTENTADA</text><rect x="45" y="110" width="560" height="70" rx="18" fill="#111821" stroke="#b98d4b"/><text x="70" y="153" class="txt h small" fill="#e24b47">DOBUTAMINA + NITRATO / NITROPRUSSIATO</text><text x="45" y="225" class="ink h small">lógica</text><text x="45" y="265" class="ink tiny">↑ contratilidade e ↓ pressões de enchimento</text><text x="45" y="295" class="ink tiny">descongestiona pulmão e melhora fluxo</text><text x="45" y="340" class="ink h tiny" fill="#b92b2f">risco: hipotensão, isquemia, toxicidade por NPS</text></g><g transform="translate(755 590)"><rect class="panel" rx="26" width="650" height="390"/><circle cx="60" cy="50" r="42" class="cyan"/><text x="46" y="66" class="txt h mid">4</text><text x="130" y="58" class="ink h mid" fill="#2f8796">VD / HIPERTENSÃO PULMONAR</text><rect x="45" y="110" width="560" height="70" rx="18" fill="#111821" stroke="#b98d4b"/><text x="70" y="153" class="txt h small" fill="#48aeca">DOBUTAMINA OU MILRINONA · USO CAUTELOSO</text><text x="45" y="225" class="ink h small">dois pilares</text><text x="45" y="265" class="ink tiny">manter RVS suficiente para perfusão coronariana do VD</text><text x="45" y="295" class="ink tiny">reduzir pós-carga pulmonar sem colapsar PAM</text><text x="45" y="340" class="ink h tiny" fill="#b92b2f">risco: hipotensão sistêmica, arritmia, isquemia</text></g><text x="50" y="1035" class="txt small">legenda: DC débito cardíaco · RVS resistência vascular sistêmica · PA pressão arterial · titular por resposta clínica.</text><text x="890" y="1035" class="txt mid" fill="#d5a64d">Módulo 28F/G · Combinações por fenótipo</text></svg>