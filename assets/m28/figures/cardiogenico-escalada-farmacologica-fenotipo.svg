<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Choque cardiogênico — escalada farmacológica por fenótipo</title><desc id="d">Figura didática do módulo 28G organizando choque cardiogênico em fenótipos farmacológicos.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:56px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="250" y="64" class="t h big"><tspan fill="#e24b47">CARDIOGÊNICO</tspan> — ESCALADA FARMACOLÓGICA POR FENÓTIPO</text><text x="360" y="110" class="t m">frio, úmido, congesto, hipertenso ou com falência de VD: a droga muda com a geometria</text><rect x="45" y="155" width="660" height="360" rx="24" class="p"/><text x="82" y="215" class="i h m" fill="#a0262b">1 · BAIXO DÉBITO + HIPOTENSO</text><text x="90" y="270" class="i s">estratégia: noradrenalina + dobutamina</text><text x="90" y="330" class="i xs">α1 resgata PAM · β1 aumenta débito · meta: perfusão, lactato e diurese</text><circle cx="610" cy="335" r="70" class="r"/><text x="575" y="360" class="t h m">α1</text><circle cx="520" cy="335" r="70" class="g"/><text x="485" y="360" class="t h m">β1</text><rect x="742" y="155" width="660" height="360" rx="24" class="p"/><text x="780" y="215" class="i h m" fill="#9b6b22">2 · BAIXO DÉBITO + CONGESTO</text><text x="788" y="270" class="i s">estratégia: inotrópico + vasodilatador</text><text x="788" y="330" class="i xs">dobutamina + nitroglicerina/nitroprussiato se PA permite</text><circle cx="1190" cy="335" r="70" class="c"/><text x="1148" y="350" class="t h s">NO</text><text x="1145" y="378" class="t h xs">cGMP</text><rect x="45" y="545" width="660" height="360" rx="24" class="p"/><text x="82" y="605" class="i h m" fill="#2f8796">3 · FALÊNCIA PREDOMINANTE DE VD</text><text x="90" y="660" class="i s">estratégia: suporte de VD + inotrópico</text><text x="90" y="720" class="i xs">manter coronária do VD · reduzir RVP · evitar hipotensão</text><circle cx="520" cy="735" r="70" class="c"/><text x="487" y="760" class="t h m">V1a</text><circle cx="610" cy="735" r="70" class="g"/><text x="562" y="760" class="t h m">PDE3</text><rect x="742" y="545" width="660" height="360" rx="24" class="p"/><text x="780" y="605" class="i h m" fill="#3d7d3d">4 · CARDIOGÊNICO + VASOPLEGIA</text><text x="788" y="660" class="i s">estratégia: noradrenalina + vasopressina ± dobutamina</text><text x="788" y="720" class="i xs">base pressórica primeiro; débito depois se ainda inadequado</text><circle cx="1190" cy="735" r="70" class="r"/><text x="1155" y="760" class="t h m">α1</text><circle cx="1280" cy="735" r="70" class="c"/><text x="1245" y="760" class="t h m">V1a</text><rect x="175" y="930" width="1098" height="75" rx="18" class="d"/><text x="210" y="978" class="t s">Não esquecer: perfusão · eco · lactato · diurese · congestão · causa reversível</text><text x="915" y="1045" class="t m" fill="#d5a64d">Módulo 28G · Cardiogênico por fenótipo</text></svg>