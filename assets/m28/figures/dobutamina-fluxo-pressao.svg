<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Dobutamina — aumentar fluxo sem perder o mapa</title><desc id="d">Infográfico didático sobre molécula, receptores, efeitos iniciais, indicações, combinações e riscos da dobutamina.</desc><defs><style>.bg{fill:#07090d}.panel{fill:#f5ecde;stroke:#b98d4b;stroke-width:3}.dark{fill:#10151c;stroke:#b98d4b;stroke-width:3}.txt{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f5ecde}.ink{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.mid{font-size:32px}.small{font-size:24px}.tiny{font-size:20px}.red{fill:#ba2c31}.cyan{fill:#2f8796}.gold{fill:#b7832e}.strokeR{stroke:#d84a4a;stroke-width:6;fill:none}.strokeC{stroke:#48aeca;stroke-width:6;fill:none}.strokeG{stroke:#c39134;stroke-width:6;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><circle cx="70" cy="60" r="38" class="red"/><path d="M42 60h18l7-18 12 40 9-22h18" stroke="#fff" stroke-width="5" fill="none"/><text x="120" y="58" class="txt h big">CHOCA</text><text x="280" y="62" class="txt h big" fill="#e24b47">DOBUTAMINA</text><text x="635" y="62" class="txt h big">— AUMENTAR FLUXO SEM PERDER O MAPA</text><text x="430" y="112" class="txt mid">inotrópico que melhora débito com pressão dependente do contexto</text><g transform="translate(35 150)"><rect class="dark" rx="24" width="330" height="210"/><text x="24" y="44" class="txt h small" fill="#d5a64d">1) MOLÉCULA</text><text x="24" y="82" class="txt small" fill="#d5a64d">Dobutamina</text><path d="M70 145 l40 -24 l40 24 l0 48 l-40 24 l-40 -24z M150 145 l55 -35 l65 20 l55 -45" stroke="#f5ecde" stroke-width="5" fill="none"/><text x="45" y="124" class="txt small">HO</text><text x="52" y="220" class="txt small">HO</text><text x="255" y="82" class="txt small">OH</text><text x="325" y="72" class="txt small">N</text></g><g transform="translate(35 390)"><rect class="panel" rx="24" width="330" height="250"/><text x="22" y="42" class="ink h small" fill="#a0262b">2) PERFIL DE RECEPTORES</text><circle cx="65" cy="94" r="42" class="red"/><text x="42" y="109" class="txt h mid">β1</text><text x="125" y="86" class="ink h small">predominante</text><text x="125" y="120" class="ink tiny">↑ inotropismo · ↑ VS · ↑ DC</text><circle cx="65" cy="164" r="36" class="cyan"/><text x="45" y="178" class="txt h small">β2</text><text x="125" y="160" class="ink h small">secundário</text><text x="125" y="192" class="ink tiny">↓ RVS se leito vasoplégico</text><circle cx="65" cy="222" r="28" class="gold"/><text x="48" y="232" class="txt h tiny">α1</text><text x="125" y="225" class="ink tiny">discreto / contextual</text></g><g transform="translate(400 150)"><rect class="dark" rx="28" width="640" height="490"/><text x="210" y="45" class="txt h small" fill="#e24b47">3) EFEITOS INICIAIS NA HEMODINÂMICA</text><ellipse cx="320" cy="250" rx="180" ry="210" fill="#17212c"/><path d="M320 105 C250 150 235 260 290 315 C270 395 350 435 410 360 C465 255 420 135 320 105Z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><path d="M300 145 C230 180 190 255 180 360 M390 155 C485 210 510 300 490 390" class="strokeR" opacity=".7"/><path d="M325 102 C300 65 270 30 245 0 M360 120 C410 70 430 30 455 0" class="strokeC"/><rect class="panel" x="20" y="90" rx="18" width="190" height="75"/><text x="40" y="138" class="ink h tiny" fill="#b92b2f">↑ INOTROPISMO</text><rect class="panel" x="20" y="205" rx="18" width="190" height="75"/><text x="40" y="253" class="ink h tiny" fill="#b92b2f">↑ VOLUME SISTÓLICO</text><rect class="panel" x="20" y="320" rx="18" width="190" height="75"/><text x="40" y="368" class="ink h tiny" fill="#b92b2f">↑ DÉBITO CARDÍACO</text><rect class="panel" x="430" y="105" rx="18" width="190" height="95"/><text x="448" y="148" class="ink h tiny" fill="#b92b2f">↑ FC POSSÍVEL</text><text x="448" y="175" class="ink tiny">dose-dependente</text><rect class="panel" x="430" y="285" rx="18" width="190" height="115"/><text x="448" y="328" class="ink h tiny" fill="#2f8796">RVS ↓ OU ↔</text><text x="448" y="360" class="ink tiny">depende do tônus</text><text x="448" y="388" class="ink tiny">e do fenótipo</text></g><g transform="translate(1080 150)"><rect class="dark" rx="24" width="330" height="490"/><text x="25" y="45" class="txt h small" fill="#e24b47">4) QUANDO PENSAR</text><text x="25" y="105" class="txt small">baixo débito</text><text x="25" y="165" class="txt small">miocardiopatia séptica</text><text x="25" y="225" class="txt small">cardiogênico frio</text><text x="25" y="285" class="txt small">disfunção de VD</text><text x="25" y="345" class="txt small">pós-operatório cardíaco</text><text x="25" y="405" class="txt small">hipoperfusão persistente</text></g><g transform="translate(35 675)"><rect class="panel" rx="24" width="830" height="300"/><text x="300" y="42" class="ink h small" fill="#a0262b">5) COMBINAÇÕES INTELIGENTES</text><g transform="translate(20 75)"><rect x="0" y="0" width="185" height="170" rx="20" fill="#fff8ed" stroke="#c39134" stroke-width="2"/><text x="16" y="34" class="ink h tiny" fill="#a0262b">DOBU + NOR</text><text x="16" y="75" class="ink tiny">baixo débito</text><text x="16" y="105" class="ink tiny">+ hipotensão</text><text x="16" y="145" class="ink tiny">↑ DC + ↑ RVS</text></g><g transform="translate(215 75)"><rect x="0" y="0" width="185" height="170" rx="20" fill="#fff8ed" stroke="#c39134" stroke-width="2"/><text x="16" y="34" class="ink h tiny" fill="#a0262b">DOBU + VASO</text><text x="16" y="75" class="ink tiny">vasoplegia</text><text x="16" y="105" class="ink tiny">refratária</text><text x="16" y="145" class="ink tiny">β1 + V1a</text></g><g transform="translate(410 75)"><rect x="0" y="0" width="185" height="170" rx="20" fill="#fff8ed" stroke="#c39134" stroke-width="2"/><text x="16" y="34" class="ink h tiny" fill="#2f8796">DOBU + NTG</text><text x="16" y="75" class="ink tiny">congestão</text><text x="16" y="105" class="ink tiny">PA adequada</text><text x="16" y="145" class="ink tiny">↓ pré-carga</text></g><g transform="translate(605 75)"><rect x="0" y="0" width="185" height="170" rx="20" fill="#fff8ed" stroke="#c39134" stroke-width="2"/><text x="16" y="34" class="ink h tiny" fill="#2f8796">DOBU + NPS</text><text x="16" y="75" class="ink tiny">pós-carga alta</text><text x="16" y="105" class="ink tiny">PA alta</text><text x="16" y="145" class="ink tiny">↓↓ pós-carga</text></g></g><g transform="translate(900 675)"><rect class="dark" rx="24" width="510" height="300"/><text x="35" y="45" class="txt h small" fill="#e24b47">6) ATENÇÃO</text><text x="35" y="105" class="txt small">• arritmias / taquicardia</text><text x="35" y="160" class="txt small">• hipotensão em vasoplegia</text><text x="35" y="215" class="txt small">• ↑ demanda de O₂ miocárdico</text><text x="35" y="270" class="txt small">• titular por resposta, não por receita</text></g><text x="940" y="1030" class="txt mid" fill="#d5a64d">Módulo 28D/E · Inotrópicos e Dobutamina</text></svg>