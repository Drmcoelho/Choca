<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Choque séptico — aba Surviving</title><desc id="d">Infográfico com lógica Surviving Sepsis, bundle inicial, escada farmacológica e reavaliação dinâmica.</desc><defs><style>.bg{fill:#07090d}.panel{fill:#f5ecde;stroke:#b98d4b;stroke-width:3}.dark{fill:#10151c;stroke:#b98d4b;stroke-width:3}.txt{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f5ecde}.ink{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.mid{font-size:30px}.small{font-size:23px}.tiny{font-size:19px}.red{fill:#ba2c31}.cyan{fill:#2f8796}.gold{fill:#b7832e}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="txt h big">CHOCA</text><text x="360" y="64" class="txt h big">CHOQUE SÉPTICO — <tspan fill="#e24b47">aba SURVIVING</tspan></text><text x="440" y="112" class="txt mid">reconhecer precocemente · ressuscitar · reavaliar continuamente</text><g transform="translate(35 150)"><rect class="panel" rx="26" width="430" height="285"/><text x="110" y="45" class="ink h small" fill="#a0262b">LÓGICA SURVIVING SEPSIS</text><text x="35" y="90" class="ink h tiny" fill="#a0262b">S</text><text x="75" y="90" class="ink tiny">Sepsis recognition — reconhecer gravidade</text><text x="35" y="120" class="ink h tiny" fill="#a0262b">U</text><text x="75" y="120" class="ink tiny">Urgent resuscitation — iniciar suporte</text><text x="35" y="150" class="ink h tiny" fill="#a0262b">R</text><text x="75" y="150" class="ink tiny">Rapid antibiotics — antibiótico precoce</text><text x="35" y="180" class="ink h tiny" fill="#a0262b">V</text><text x="75" y="180" class="ink tiny">Volume & vasopressors — volume/pressor</text><text x="35" y="210" class="ink h tiny" fill="#a0262b">I</text><text x="75" y="210" class="ink tiny">Infection source control — controle foco</text><text x="35" y="240" class="ink h tiny" fill="#a0262b">N/G</text><text x="75" y="240" class="ink tiny">Normalizar perfusão e desescalar</text></g><g transform="translate(35 470)"><rect class="panel" rx="26" width="430" height="420"/><text x="90" y="45" class="ink h small" fill="#a0262b">BUNDLE DA PRIMEIRA HORA</text><text x="35" y="95" class="ink tiny">1. reconhecer sepse / choque rapidamente</text><text x="35" y="140" class="ink tiny">2. lactato inicial e reavaliação</text><text x="35" y="185" class="ink tiny">3. culturas antes do antibiótico, sem atrasar</text><text x="35" y="230" class="ink tiny">4. antibiótico EV precoce</text><text x="35" y="275" class="ink tiny">5. cristaloide se hipotensão/hipoperfusão</text><text x="35" y="320" class="ink tiny">6. noradrenalina se hipotensão persistente</text><text x="35" y="365" class="ink tiny">7. controle de foco + reavaliação contínua</text></g><g transform="translate(520 180)"><ellipse cx="220" cy="260" rx="210" ry="260" fill="#14212b" stroke="#273340" stroke-width="4"/><circle cx="150" cy="135" r="38" fill="#b13b34"/><circle cx="300" cy="130" r="34" fill="#b13b34"/><circle cx="230" cy="85" r="22" fill="#456678"/><path d="M220 230 C160 270 150 355 200 405 C185 460 260 490 305 430 C360 345 320 260 220 230Z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><path d="M205 235 C150 310 115 395 95 520 M285 250 C360 310 385 420 385 545" stroke="#d84a4a" stroke-width="6" fill="none" opacity=".75"/><text x="95" y="605" class="txt small">infecção → vasoplegia → hipoperfusão</text></g><g transform="translate(870 150)"><rect class="dark" rx="26" width="535" height="555"/><text x="65" y="45" class="txt h small" fill="#e24b47">ESCADA HEMODINÂMICA NO CHOQUE SÉPTICO</text><g transform="translate(30 80)"><rect class="panel" rx="20" width="475" height="90"/><circle cx="45" cy="45" r="32" class="red"/><text x="35" y="58" class="txt h small">1</text><text x="90" y="38" class="ink h tiny" fill="#a0262b">NORADRENALINA · 1ª LINHA</text><text x="90" y="68" class="ink tiny">α1 + β1 · titular para PAM/perfusão</text></g><g transform="translate(30 195)"><rect class="panel" rx="20" width="475" height="90"/><circle cx="45" cy="45" r="32" class="cyan"/><text x="35" y="58" class="txt h small">2</text><text x="90" y="38" class="ink h tiny" fill="#2f8796">VASOPRESSINA · ADJUVANTE</text><text x="90" y="68" class="ink tiny">V1a · poupar noradrenalina</text></g><g transform="translate(30 310)"><rect class="panel" rx="20" width="475" height="90"/><circle cx="45" cy="45" r="32" class="gold"/><text x="35" y="58" class="txt h small">3</text><text x="90" y="38" class="ink h tiny" fill="#9b6b22">ADRENALINA · ESCALONAMENTO</text><text x="90" y="68" class="ink tiny">α1 β1 β2 · cautela: FC/lactato</text></g><g transform="translate(30 425)"><rect class="panel" rx="20" width="475" height="90"/><circle cx="45" cy="45" r="32" class="cyan"/><text x="35" y="58" class="txt h small">4</text><text x="90" y="38" class="ink h tiny" fill="#2f8796">DOBUTAMINA · BAIXO DÉBITO</text><text x="90" y="68" class="ink tiny">β1 · miocardiopatia séptica / hipoperfusão</text></g></g><g transform="translate(500 750)"><rect class="panel" rx="26" width="560" height="180"/><text x="100" y="45" class="ink h small" fill="#a0262b">NÃO ESQUECER · REAVALIAÇÃO DINÂMICA</text><text x="35" y="92" class="ink tiny">perfusão periférica · diurese · estado mental</text><text x="35" y="128" class="ink tiny">lactato seriado · eco à beira-leito · resposta a volume</text><text x="35" y="164" class="ink tiny">desescalar quando o fenótipo muda</text></g><g transform="translate(1090 750)"><rect class="panel" rx="26" width="315" height="180"/><text x="58" y="45" class="ink h small" fill="#a0262b">METAS INICIAIS</text><text x="35" y="90" class="ink tiny">□ PAM ≥ 65 mmHg</text><text x="35" y="120" class="ink tiny">□ lactato em queda</text><text x="35" y="150" class="ink tiny">□ diurese ≥ 0,5 mL/kg/h</text></g><text x="55" y="1028" class="txt small">nota: protocolo é camada sobre fisiologia; reavaliar continuamente e individualizar conforme contexto.</text><text x="890" y="1028" class="txt mid" fill="#d5a64d">Módulo 21 · Choque séptico — aba Surviving</text></svg>