<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Adrenalina — quando aumentar tudo tem preço</title><desc id="d">Figura didática do módulo 28D mostrando perfil alfa-beta dose-dependente, efeitos e riscos da adrenalina.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="290" y="64" class="t h big">ADRENALINA — <tspan fill="#e24b47">AUMENTAR TUDO TEM PREÇO</tspan></text><text x="430" y="110" class="t m">catecolamina dose-dependente: inotrópica, cronotrópica e vasopressora</text><rect x="34" y="150" width="360" height="310" rx="24" class="p"/><text x="62" y="205" class="i h m" fill="#a0262b">1 · MOLÉCULA</text><path d="M105 340l65-38 66 38v76l-66 38-65-38zM236 340l64-34 60 34v75" stroke="#171512" stroke-width="5" fill="none"/><text x="86" y="328" class="i xs">HO</text><text x="145" y="292" class="i xs">HO</text><text x="360" y="430" class="i xs">NHCH₃</text><text x="62" y="520" class="i s">α + β em uma única droga</text><rect x="425" y="150" width="420" height="310" rx="24" class="p"/><text x="455" y="205" class="i h m" fill="#a0262b">2 · RECEPTORES</text><circle cx="505" cy="282" r="48" class="r"/><text x="475" y="300" class="t h m">β₁</text><text x="580" y="275" class="i s">inotropia · cronotropia</text><circle cx="505" cy="383" r="48" class="c"/><text x="475" y="400" class="t h m">β₂</text><text x="580" y="376" class="i s">vasodilatação contextual</text><circle cx="742" cy="332" r="48" class="r"/><text x="712" y="350" class="t h m">α₁</text><text x="690" y="415" class="i xs">cresce em dose/choque</text><rect x="880" y="150" width="532" height="470" rx="24" class="d"/><text x="910" y="205" class="t h m" fill="#d5a64d">3 · GEOMETRIA DO EFEITO</text><path d="M965 510h360" stroke="#b58a49" stroke-width="6"/><circle cx="990" cy="510" r="20" class="c"/><circle cx="1135" cy="510" r="28" class="g"/><circle cx="1290" cy="510" r="36" class="r"/><text x="945" y="275" class="t s">dose baixa/contexto β → DC↑, FC↑</text><text x="945" y="345" class="t s">dose alta/contexto α → RVS↑, PAM↑</text><text x="945" y="415" class="t s">lactato pode subir por β₂/metabolismo</text><text x="945" y="575" class="t xs">não confundir hiperlactatemia farmacológica com piora automática</text><rect x="34" y="500" width="650" height="380" rx="24" class="p"/><text x="64" y="555" class="i h m" fill="#a0262b">4 · QUANDO PENSAR</text><text x="76" y="610" class="i s">• PCR e anafilaxia</text><text x="76" y="658" class="i s">• cardiogênico profundo com hipotensão</text><text x="76" y="706" class="i s">• séptico refratário como escalada</text><text x="76" y="754" class="i s">• baixo débito hipotenso quando dobutamina isolada não cabe</text><rect x="720" y="660" width="692" height="220" rx="24" class="p"/><text x="750" y="720" class="i h m" fill="#a0262b">5 · ATENÇÃO</text><text x="760" y="780" class="i s">taquiarritmias · isquemia · demanda miocárdica · lactato interpretado no contexto</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 28D · Adrenalina</text></svg>