lass="ink h mid">↓ / ↔</text><rect class="cell" x="750" width="210" height="145"/><text x="810" y="72" class="ink h mid">↔ ou ↓</text><rect class="cell" x="960" width="190" height="145"/><text x="1030" y="72" class="ink h mid">↑↑</text><rect class="dark" x="1150" width="248" height="145"/><text x="1175" y="48" class="txt h small" fill="#6aa354">taquicardia + hipoPA</text><text x="1175" y="92" class="txt tiny">não é inotrópico</text></g><g transform="translate(25 700)"><rect class="dark" width="240" height="145"/><text x="30" y="50" class="txt h mid" fill="#48aeca">VASOPRESSINA</text><text x="30" y="95" class="txt tiny">não adrenérgica</text><rect class="cell" x="240" width="210" height="145"/><text x="265" y="45" class="ink small">V1a principal</text><text x="265" y="80" class="ink small">V2 renal</text><rect class="cell" x="450" width="155" height="145"/><text x="500" y="72" class="ink h mid">↑↑</text><rect class="cell" x="605" width="145" height="145"/><text x="650" y="72" class="ink h mid">↔</text><rect class="cell" x="750" width="210" height="145"/><text x="835" y="72" class="ink h mid">↔</text><rect class="cell" x="960" width="190" height="145"/><text x="1030" y="72" class="ink h mid">↑↑</text><rect class="dark" x="1150" width="248" height="145"/><text x="1175" y="45" class="txt h small" fill="#48aeca">refratário</text><text x="1175" y="88" class="txt tiny">poupador de NA</text></g><g transform="translate(25 855)"><rect class="dark" width="240" height="145"/><text x="30" y="50" class="txt h mid" fill="#a86bd8">ANGIOTENSINA II</text><text x="30" y="95" class="txt tiny">AT1</text><rect class="cell" x="240" width="210" height="145"/><text x="265" y="60" class="ink small">AT1</text><rect class="cell" x="450" width="155" height="145"/><text x="500" y="72" class="ink h mid">↑↑</text><rect class="cell" x="605" width="145" height="145"/><text x="650" y="72" class="ink h mid">↔</text><rect class="cell" x="750" width="210" height="145"/><text x="805" y="72" class="ink h mid">↔/↑ leve</text><rect class="cell" x="960" width="190" height="145"/><text x="1045" y="72" class="ink h mid">↑</text><rect class="dark" x="1150" width="248" height="145"/><text x="1175" y="45" class="txt h small" fill="#a86bd8">salvamento</text><text x="1175" y="88" class="txt tiny">refratário guiado</text></g><text x="50" y="1045" class="txt small">nota: titular por perfusão clínica, diurese, lactato e fenótipo — não só pelo número da pressão.</text></svg>