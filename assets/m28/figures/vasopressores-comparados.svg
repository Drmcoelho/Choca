<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Vasopressores comparados</title><desc id="d">Tabela comparativa de vasopressores por receptor, RVS, FC, contratilidade, pré-carga, riscos e uso preferencial.</desc><defs><style>.bg{fill:#07090d}.head{fill:#111821;stroke:#b98d4b;stroke-width:2}.cell{fill:#f5ecde;stroke:#273340;stroke-width:2}.dark{fill:#10151c;stroke:#273340;stroke-width:2}.txt{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f5ecde}.ink{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.mid{font-size:28px}.small{font-size:22px}.tiny{font-size:18px}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="txt h big">CHOCA</text><text x="360" y="64" class="txt h big">VASOPRESSORES <tspan fill="#e24b47">COMPARADOS</tspan></text><text x="420" y="115" class="txt mid" fill="#d5a64d">a mesma PAM pode ser resgatada por mecanismos diferentes</text><g transform="translate(25 145)"><rect class="head" width="1398" height="75" rx="20"/><text x="45" y="48" class="txt h small">FÁRMACO</text><text x="285" y="35" class="txt h tiny">RECEPTOR / ALVO</text><text x="500" y="35" class="txt h tiny">RVS</text><text x="660" y="35" class="txt h tiny">FC</text><text x="805" y="35" class="txt h tiny">CONTRATILIDADE</text><text x="1020" y="35" class="txt h tiny">PRÉ-CARGA</text><text x="1190" y="35" class="txt h tiny">ONDE BRILHA</text></g><g transform="translate(25 235)"><rect class="dark" width="240" height="145"/><text x="30" y="50" class="txt h mid" fill="#e24b47">NORADRENALINA</text><text x="30" y="95" class="txt tiny">catecolamina endógena</text><rect class="cell" x="240" width="210" height="145"/><text x="265" y="45" class="ink small">α1 principal</text><text x="265" y="80" class="ink small">β1 moderado</text><rect class="cell" x="450" width="155" height="145"/><text x="492" y="72" class