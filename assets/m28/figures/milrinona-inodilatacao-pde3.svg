<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Milrinona — inodilatação via PDE3</title><desc id="d">Figura didática do módulo 28F sobre milrinona, inotropia, vasodilatação sistêmica e pulmonar e risco de hipotensão.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}.ln{stroke:#b58a49;stroke-width:4;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><text x="70" y="64" class="t h big">CHOCA</text><text x="310" y="64" class="t h big">MILRINONA — <tspan fill="#e24b47">INODILATAÇÃO VIA PDE3</tspan></text><text x="430" y="110" class="t m">aumentar contratilidade enquanto reduz pós-carga e resistência pulmonar</text><rect x="35" y="150" width="380" height="300" rx="24" class="p"/><text x="65" y="205" class="i h m" fill="#a0262b">1 · MOLÉCULA</text><path d="M95 350h70l44-58h70l44 58h70M165 350l44 68h70l44-68M493 350l45 50" stroke="#171512" stroke-width="5" fill="none"/><text x="530" y="410" class="i xs">CN</text><text x="65" y="260" class="i s">inibidor de fosfodiesterase 3</text><rect x="445" y="150" width="450" height="300" rx="24" class="p"/><text x="475" y="205" class="i h m" fill="#2f8796">2 · ALVO</text><circle cx="545" cy="310" r="62" class="g"/><text x="492" y="333" class="t h m">PDE3</text><text x="635" y="290" class="i s">↑ cAMP miocárdico</text><text x="635" y="332" class="i s">↑ cAMP músculo liso</text><text x="635" y="374" class="i s">ino + vasodilatação</text><rect x="925" y="150" width="488" height="480" rx="24" class="d"/><text x="955" y="205" class="t h m" fill="#d5a64d">3 · EFEITOS INICIAIS</text><circle cx="1165" cy="380" r="110" fill="#14202a" stroke="#2f8796" stroke-width="6"/><path d="M1165 285c-60 40-58 140-8 174 50 30 98-25 88-78-8-48-36-78-80-96z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><text x="970" y="300" class="t s">↑ inotropia</text><text x="970" y="528" class="t s">↓ RVP</text><text x="1225" y="300" class="t s">↓ RVS</text><text x="1225" y="528" class="t s">↑ débito VD/VE</text><path d="M1095 330l-90-32M1095 430l-90 90M1235 330l80-33M1235 430l80 90" class="ln"/><rect x="35" y="500" width="650" height="390" rx="24" class="p"/><text x="65" y="555" class="i h m" fill="#a0262b">4 · QUANDO PENSAR</text><text x="75" y="610" class="i s">• baixo débito em uso de beta-bloqueador</text><text x="75" y="658" class="i s">• falência de VD / hipertensão pulmonar</text><text x="75" y="706" class="i s">• VE congesto com pressão preservada</text><text x="65" y="795" class="i h m" fill="#a0262b">Combinações</text><text x="75" y="840" class="i s">milrinona + noradrenalina · milrinona + vasopressina</text><rect x="720" y="660" width="692" height="230" rx="24" class="p"/><text x="750" y="720" class="i h m" fill="#a0262b">5 · ATENÇÃO</text><text x="760" y="780" class="i s">hipotensão · depuração renal · arritmias · início mais lento que catecolaminas</text><text x="915" y="1018" class="t m" fill="#d5a64d">Módulo 28F · Milrinona</text></svg>