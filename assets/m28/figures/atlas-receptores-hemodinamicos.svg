<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Atlas de receptores hemodinâmicos</title><desc id="d">Mapa didático dos principais receptores cardiovasculares, seus efeitos iniciais e fármacos representativos.</desc><defs><style>.bg{fill:#07090d}.panel{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.dark{fill:#10151c;stroke:#b58a49;stroke-width:3}.red{fill:#b92b2f}.cyan{fill:#2f8796}.gold{fill:#b7832e}.txt{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.ink{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#1a1713}.h{font-weight:800;letter-spacing:.04em}.small{font-size:25px}.mid{font-size:34px}.big{font-size:60px}.tiny{font-size:20px}.line{stroke:#b58a49;stroke-width:4}.rline{stroke:#d84a4a;stroke-width:6;fill:none}.cline{stroke:#48aeca;stroke-width:6;fill:none}.gline{stroke:#c39134;stroke-width:6;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><circle cx="70" cy="64" r="38" class="red"/><path d="M42 64h18l7-18 12 40 9-22h18" stroke="#fff" stroke-width="5" fill="none"/><text x="120" y="58" class="txt h big">CHOCA</text><text x="120" y="93" class="txt small" fill="#cfa65a">APRENDIZADO CRÍTICO</text><text x="350" y="64" class="txt h big">ATLAS DE <tspan fill="#e24b47">RECEPTORES HEMODINÂMICOS</tspan></text><text x="445" y="110" class="txt mid">principais receptores e efeitos iniciais no sistema cardiovascular</text><path d="M250 118h170M1025 118h170" class="line"/><g transform="translate(575 205)"><ellipse cx="150" cy="250" rx="170" ry="245" fill="#18212b" stroke="#2e3a48" stroke-width="3"/><path d="M150 100 C80 145 70 255 125 320 C105 410 185 450 240 380 C305 280 250 135 150 100Z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><path d="M120 155 C50 180 15 260 10 360 M210 170 C315 210 345 300 330 390" class="rline" opacity=".65"/><path d="M155 95 C115 60 88 20 70 0 M185 110 C230 75 250 25 270 0" class="cline" opacity=".85"/><text x="75" y="520" class="txt mid">coração · vasos · leito microcirculatório</text></g><g transform="translate(45 150)"><rect class="panel" rx="26" width="360" height="150"/><circle cx="58" cy="65" r="52" class="red"/><text x="30" y="83" class="txt h big">α1</text><text x="120" y="48" class="ink h mid" fill="#b92b2f">VASOCONSTRIÇÃO</text><text x="120" y="82" class="ink small">↑ RVS · ↑ retorno venoso</text><text x="120" y="116" class="ink small">↑ pressão arterial</text></g><g transform="translate(45 335)"><rect class="panel" rx="26" width="360" height="160"/><circle cx="58" cy="70" r="52" class="red"/><text x="30" y="88" class="txt h big">β1</text><text x="120" y="48" class="ink h mid" fill="#b92b2f">INOTROPIA + CRONO</text><text x="120" y="84" class="ink small">↑ contratilidade</text><text x="120" y="118" class="ink small">↑ FC · ↑ condução AV</text></g><g transform="translate(45 535)"><rect class="panel" rx="26" width="360" height="180"/><circle cx="58" cy="78" r="52" class="cyan"/><text x="30" y="96" class="txt h big">β2</text><text x="120" y="48" class="ink h mid" fill="#2f8796">VASODILATAÇÃO</text><text x="120" y="84" class="ink small">↓ RVS contextual</text><text x="120" y="118" class="ink small">broncodilatação</text><text x="120" y="152" class="ink small">vasodilatação pulmonar</text></g><g transform="translate(45 765)"><rect class="panel" rx="26" width="420" height="185"/><circle cx="58" cy="78" r="52" class="gold"/><text x="10" y="96" class="txt h big">PDE3</text><text x="130" y="48" class="ink h mid" fill="#9b6b22">INO + VASODILATA</text><text x="130" y="86" class="ink small">↑ contratilidade</text><text x="130" y="122" class="ink small">↓ pré-carga · ↓ pós-carga</text><text x="130" y="158" class="ink small">↑ débito cardíaco</text></g><g transform="translate(820 150)"><rect class="panel" rx="26" width="390" height="165"/><circle cx="58" cy="70" r="52" class="red"/><text x="18" y="88" class="txt h big">V1a</text><text x="130" y="52" class="ink h mid" fill="#b92b2f">VASOCONSTRIÇÃO</text><text x="130" y="90" class="ink small">potente · não adrenérgica</text><text x="130" y="126" class="ink small">↑ RVS · ↑ retorno venoso</text></g><g transform="translate(850 405)"><rect class="panel" rx="26" width="400" height="180"/><circle cx="58" cy="78" r="52" class="gold"/><text x="25" y="96" class="txt h big">D1</text><text x="130" y="52" class="ink h mid" fill="#9b6b22">FLUXO REGIONAL</text><text x="130" y="90" class="ink small">renal · mesentérico</text><text x="130" y="126" class="ink small">coronariano</text></g><g transform="translate(730 720)"><rect class="panel" rx="26" width="420" height="185"/><circle cx="58" cy="78" r="52" class="cyan"/><text x="16" y="78" class="txt h mid">NO/</text><text x="12" y="112" class="txt h mid">cGMP</text><text x="130" y="52" class="ink h mid" fill="#2f8796">VASODILATAÇÃO</text><text x="130" y="90" class="ink small">relaxamento músculo liso</text><text x="130" y="126" class="ink small">↓ pré e pós-carga</text><text x="130" y="160" class="ink small">microcirculação</text></g><g transform="translate(1140 610)"><rect class="panel" rx="26" width="260" height="210"/><circle cx="70" cy="72" r="52" class="red"/><text x="32" y="90" class="txt h big">AT1</text><text x="32" y="145" class="ink h small" fill="#b92b2f">vasoconstrição</text><text x="32" y="180" class="ink small">retenção Na+ e água</text></g><g transform="translate(1165 145)"><rect class="dark" rx="26" width="245" height="410"/><text x="22" y="45" class="txt h small" fill="#d5a64d">FÁRMACOS</text><text x="22" y="87" class="txt tiny">noradrenalina → α1 β1</text><text x="22" y="130" class="txt tiny">adrenalina → α β</text><text x="22" y="173" class="txt tiny">dobutamina → β1&gt;&gt;β2</text><text x="22" y="216" class="txt tiny">vasopressina → V1a</text><text x="22" y="259" class="txt tiny">fenilefrina → α1</text><text x="22" y="302" class="txt tiny">milrinona → PDE3</text><text x="22" y="345" class="txt tiny">nitratos → NO/cGMP</text><text x="22" y="388" class="txt tiny">angiotensina II → AT1</text></g><path d="M405 225 C490 220 505 260 575 275" class="rline"/><path d="M405 420 C495 420 505 460 575 455" class="rline"/><path d="M405 620 C520 630 550 620 625 600" class="cline"/><path d="M465 850 C580 790 615 765 730 805" class="gline"/><path d="M1015 315 C955 355 925 380 865 425" class="rline"/><path d="M990 585 C920 620 850 655 790 720" class="gline"/><text x="50" y="1018" class="txt small">↑ aumenta   ↓ diminui   ~ vasoconstrição / vasodilatação   ⚙ fluxo-perfusão</text><text x="915" y="1018" class="txt mid" fill="#d5a64d">Módulo 28 · Farmacologia hemodinâmica</text></svg>