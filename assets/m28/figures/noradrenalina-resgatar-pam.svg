<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="t d"><title id="t">Noradrenalina — resgatar PAM sem apagar a perfusão</title><desc id="d">Figura didática do módulo 28B mostrando perfil alfa-1 dominante, efeitos hemodinâmicos e combinações da noradrenalina.</desc><defs><style>.bg{fill:#07090d}.p{fill:#f3eadc;stroke:#b58a49;stroke-width:3}.d{fill:#10151c;stroke:#b58a49;stroke-width:3}.r{fill:#b92b2f}.c{fill:#2f8796}.g{fill:#b7832e}.t{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#f4eadb}.i{font-family:system-ui,-apple-system,Segoe UI,sans-serif;fill:#171512}.h{font-weight:800}.big{font-size:58px}.m{font-size:30px}.s{font-size:23px}.xs{font-size:18px}.ln{stroke:#b58a49;stroke-width:4;fill:none}</style></defs><rect class="bg" width="1448" height="1086"/><circle cx="70" cy="62" r="38" class="r"/><path d="M42 62h18l7-18 12 40 9-22h18" stroke="#fff" stroke-width="5" fill="none"/><text x="120" y="58" class="t h big">CHOCA</text><text x="300" y="62" class="t h big"><tspan fill="#e24b47">NORADRENALINA</tspan> — RESGATAR PAM SEM APAGAR A PERFUSÃO</text><text x="405" y="108" class="t m">vasopressor de primeira linha para vasoplegia e hipotensão crítica</text><rect x="34" y="155" width="360" height="315" rx="24" class="p"/><text x="62" y="208" class="i h m" fill="#a0262b">1 · MOLÉCULA</text><text x="62" y="256" class="i s">Catecolamina endógena</text><path d="M110 350l65-38 66 38v76l-66 38-65-38zM241 350l70-40M175 312v-72M175 464v72M311 310l55 35M366 345v65" stroke="#171512" stroke-width="5" fill="none"/><text x="92" y="336" class="i xs">HO</text><text x="150" y="235" class="i xs">OH</text><text x="360" y="420" class="i xs">NH₂</text><rect x="420" y="155" width="365" height="315" rx="24" class="p"/><text x="448" y="208" class="i h m" fill="#a0262b">2 · RECEPTORES</text><circle cx="500" cy="278" r="54" class="r"/><text x="468" y="298" class="t h big">α₁</text><text x="580" y="270" class="i h s">predominante</text><text x="580" y="304" class="i s">↑ RVS · ↑ retorno venoso</text><circle cx="500" cy="388" r="48" class="c"/><text x="468" y="405" class="t h m">β₁</text><text x="580" y="382" class="i h s">secundário</text><text x="580" y="416" class="i s">↑ contratilidade modesta</text><rect x="812" y="155" width="602" height="500" rx="24" class="d"/><text x="842" y="208" class="t h m" fill="#d5a64d">3 · EFEITOS INICIAIS</text><circle cx="1090" cy="400" r="125" fill="#26131a" stroke="#e24b47" stroke-width="6"/><path d="M1090 275c-70 45-68 150-12 188 52 36 108-20 95-86-8-50-38-83-83-102z" fill="#c83f3e" stroke="#f08f80" stroke-width="5"/><text x="874" y="290" class="t s">↑ RVS</text><text x="874" y="328" class="t xs">vasoconstrição arteriolar</text><text x="875" y="535" class="t s">↑ retorno venoso</text><text x="875" y="573" class="t xs">venoconstrição e pré-carga</text><text x="1198" y="300" class="t s">↑ PAM</text><text x="1198" y="338" class="t xs">pressão de perfusão</text><text x="1198" y="535" class="t s">FC variável</text><text x="1198" y="573" class="t xs">barorreflexo possível</text><path d="M1012 344L900 305M1004 456L900 535M1175 344l82-45M1175 456l82 66" class="ln"/><rect x="34" y="500" width="680" height="390" rx="24" class="p"/><text x="62" y="555" class="i h m" fill="#a0262b">4 · QUANDO PENSAR</text><text x="70" y="610" class="i s">• choque distributivo/séptico com hipotensão</text><text x="70" y="658" class="i s">• vasoplegia pós-intubação ou anestesia</text><text x="70" y="706" class="i s">• cardiogênico hipotenso como chão pressórico</text><text x="70" y="754" class="i s">• peri-arresto até correção da causa</text><text x="62" y="830" class="i h m" fill="#a0262b">Combinações</text><text x="70" y="872" class="i s">NE + dobutamina · NE + vasopressina · NE + adrenalina</text><rect x="745" y="690" width="669" height="200" rx="24" class="p"/><text x="780" y="748" class="i h m" fill="#a0262b">5 · ATENÇÃO</text><text x="790" y="802" class="i s">extrava