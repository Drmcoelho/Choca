name: check

# Portão de build do PERFUNDE·CHOCA: engine (Node) + jsdom.
# A guarda fromCharCode dos validateN.js barra a reintrodução da
# dedicatória pessoal — inclusive via merge do braço 1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run check
